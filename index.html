<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar — Team · Ipsos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* Brand */
  --navy:      #192166;
  --teal:      #00C4D0;
  --teal-deep: #009EBD;
  --amber:     #d97706;
  --green:     #3d9e4a;
  --red:       #e4003a;
  /* Surfaces */
  --bg:        #f0f2f7;
  --bg2:       #f6f8fc;
  --surface:   rgba(255,255,255,0.82);
  --surface-s: #ffffff;
  --border:    rgba(25,33,102,0.11);
  --border-m:  rgba(25,33,102,0.18);
  --muted:     #7a85a8;
  --muted2:    #9aaac8;
  /* Tints */
  --navy-tint: rgba(25,33,102,0.06);
  --teal-tint: rgba(0,196,208,0.10);
  --amber-tint: rgba(217,119,6,0.10);
  --red-tint:  rgba(228,0,58,0.08);
  --green-tint: rgba(61,158,74,0.10);
  /* Radii */
  --r:    13px;
  --r-sm: 8px;
  /* Gradient */
  --grad: linear-gradient(135deg, #192166 0%, #009EBD 55%, #00C4D0 100%);
  /* AI provider brand (kept distinct for tab badges) */
  --claude: #d97706; --claude-l: #fef3c7;
  --gemini: #4285f4; --gemini-l: #dbeafe;
  --chatgpt: #10a37f; --chatgpt-l: #d1fae5;
  --other:  #7a85a8; --other-l: #e4ebf3;
  --team:   #192166; --team-l: rgba(25,33,102,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--navy); font-size: 13px;
  position: relative; min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 40% at 0% 0%, rgba(25,33,102,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 100% 100%, rgba(0,196,208,0.05) 0%, transparent 70%);
}
#app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: rgba(25,33,102,0.18); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(25,33,102,0.32); }
input, textarea, select, button { font-family: 'Inter', sans-serif; }

/* ── TOPBAR ── */
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 22px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; gap: 16px;
  box-shadow: none;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--teal-deep);
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--navy); letter-spacing: -.2px; }
.topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; display: flex; align-items: center; gap: 8px; }
.save-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; cursor: help; transition: all .2s; }
.save-dot.saving { background: var(--teal-deep); animation: pulse 1.2s infinite; }
.save-dot.saved  { background: var(--green); box-shadow: 0 0 0 3px rgba(61,158,74,0.15); }
.save-dot.error  { background: var(--red); box-shadow: 0 0 0 3px rgba(228,0,58,0.20); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.tabs-wrap { display: flex; gap: 2px; background: transparent; border-radius: 0; padding: 0; border: none; border-bottom: 1px solid var(--border); align-self: stretch; }
.tab-btn {
  background: transparent; color: var(--muted); border: none; border-radius: 0;
  padding: 0 16px; height: 44px; font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-btn:hover { color: var(--navy); background: var(--navy-tint); }
.tab-btn.active { background: #fff; color: var(--navy); font-weight: 700; box-shadow: 0 1px 4px rgba(25,33,102,0.10); border-bottom: 2px solid var(--teal-deep); }
.tab-count { font-size: 10px; background: var(--navy-tint); border-radius: 6px; padding: 1px 6px; font-weight: 600; color: var(--muted); }
.tab-btn.active .tab-count { background: rgba(0,158,189,0.12); color: var(--teal-deep); }

.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn {
  background: rgba(255,255,255,0.9); color: var(--navy);
  border: 1.5px solid var(--border-m); border-radius: var(--r-sm);
  padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.icon-btn:hover { background: #fff; border-color: var(--navy); box-shadow: 0 2px 8px rgba(25,33,102,0.12); }
.icon-btn-square { padding: 7px 9px; }

/* ── FILTERBAR ── */
.filterbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 10px 22px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.filter-search {
  flex: 1; min-width: 200px; max-width: 360px; position: relative;
}
.filter-search input {
  width: 100%; padding: 8px 12px 8px 34px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border-m);
  background: rgba(255,255,255,0.9); font-size: 13px; outline: none; color: var(--navy);
  transition: all .15s;
}
.filter-search input:focus { border-color: var(--teal-deep); background: #fff; box-shadow: 0 0 0 3px rgba(0,196,208,0.12); }
.filter-search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 14px; pointer-events: none;
}
.filter-chips { display: flex; gap: 2px; background: var(--bg); border-radius: var(--r-sm); padding: 3px; border: 1px solid var(--border); }
.chip {
  background: transparent; color: var(--muted); border: none; border-radius: 5px;
  padding: 4px 10px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.chip:hover { color: var(--navy); background: rgba(255,255,255,0.8); }
.chip.active { background: #fff; color: var(--navy); font-weight: 600; box-shadow: 0 1px 3px rgba(25,33,102,0.06); }
.chip-count { font-size: 10px; background: var(--navy-tint); color: var(--muted); border-radius: 10px; padding: 1px 6px; font-weight: 700; margin-left: 4px; }
.chip.active .chip-count { background: var(--teal-tint); color: var(--teal-deep); }

.filter-select {
  padding: 7px 11px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border-m);
  background: rgba(255,255,255,0.9); font-size: 12px; color: var(--navy);
  cursor: pointer; outline: none;
}
.filter-select:hover { border-color: var(--teal-deep); }

.toggle-btn {
  background: rgba(255,255,255,0.8); border: 1.5px solid var(--border-m);
  border-radius: var(--r-sm); padding: 6px 12px; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.toggle-btn:hover { color: var(--navy); border-color: var(--teal-deep); }
.toggle-btn.active {
  background: var(--teal-tint); color: var(--teal-deep); border-color: var(--teal-deep);
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1; padding: 20px 22px 100px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: 14px; align-content: start;
}
.main-content.list-view {
  display: flex; flex-direction: column; gap: 8px;
  max-width: 920px; margin-left: auto; margin-right: auto; width: 100%;
}
.main-content.list-view .item-card {
  flex-direction: row; min-height: 78px; max-height: 100px;
}
.main-content.list-view .item-card.unread::before { width: 3px; }
.main-content.list-view .item-image {
  width: 130px; min-width: 130px; aspect-ratio: auto; height: auto; align-self: stretch;
}
.main-content.list-view .item-image-fallback { font-size: 28px; }
.main-content.list-view .item-source-badge {
  top: 6px; left: 6px; font-size: 9px; padding: 2px 6px;
}
.main-content.list-view .item-tab-badge {
  top: 6px; right: 6px; font-size: 9px; padding: 2px 6px;
}
.main-content.list-view .type-icon {
  bottom: 6px; right: 6px; width: 22px; height: 22px; font-size: 11px;
}
.main-content.list-view .item-body { padding: 10px 14px; }
.main-content.list-view .item-title { font-size: 13px; -webkit-line-clamp: 1; margin-bottom: 3px; }
.main-content.list-view .item-desc { font-size: 11px; -webkit-line-clamp: 1; margin-bottom: 4px; line-height: 1.4; }
.main-content.list-view .item-tags { margin-bottom: 4px; }
.main-content.list-view .item-foot { padding-top: 4px; border-top: none; }
.empty-state {
  grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--muted);
}
.empty-state-icon { margin-bottom: 16px; opacity: 0.7; display: flex; align-items: center; justify-content: center; }
.empty-state-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; max-width: 380px; margin-left: auto; margin-right: auto; line-height: 1.6; }

/* ── ITEM CARD ── */
.item-card {
  background: #fff;
  border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden; cursor: pointer; transition: all .2s;
  display: flex; flex-direction: column; position: relative;
}
.item-card:hover {
  transform: translateY(-2px); border-color: var(--border-m);
  box-shadow: 0 8px 24px rgba(25,33,102,0.10); background: #fff;
}
.item-card.unread::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--grad); z-index: 2;
}
.item-image {
  width: 100%; aspect-ratio: 1.91 / 1; background: linear-gradient(135deg, #edf0f8, #dfe5f0);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted2); font-size: 48px; overflow: hidden; position: relative;
}
.item-image img { width: 100%; height: 100%; object-fit: cover; }
.item-image-fallback {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; font-size: 48px; opacity: 0.5;
}
.item-source-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
  border-radius: 6px; padding: 3px 8px; font-size: 10px; font-weight: 700;
  color: var(--navy); display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 6px rgba(25,33,102,0.10);
}
.item-tab-badge {
  position: absolute; top: 10px; right: 10px; border-radius: 6px;
  padding: 3px 8px; font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.04em; box-shadow: 0 2px 6px rgba(25,33,102,0.10);
}
.tab-claude  { background: var(--claude-l);  color: var(--claude);  border: 1px solid var(--claude); }
.tab-gemini  { background: var(--gemini-l);  color: var(--gemini);  border: 1px solid var(--gemini); }
.tab-chatgpt { background: var(--chatgpt-l); color: var(--chatgpt); border: 1px solid var(--chatgpt); }
.tab-other   { background: var(--other-l);   color: var(--other);   border: 1px solid var(--other); }
.tab-team    { background: var(--team-l);    color: var(--team);    border: 1px solid var(--team); }

.type-icon {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(25,33,102,0.7); color: #fff; border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; backdrop-filter: blur(4px);
}

.item-body { padding: 12px 14px 10px; flex: 1; display: flex; flex-direction: column; }
.item-title {
  font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.35;
  margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.item-card.unread .item-title { font-weight: 800; }
.item-desc {
  font-size: 12px; color: #4b5876; line-height: 1.5; margin-bottom: 8px; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.tag-chip {
  background: var(--teal-tint); color: var(--teal-deep); border: 1px solid rgba(0,196,208,0.25);
  border-radius: 5px; padding: 1px 6px; font-size: 10px; font-weight: 600;
}

.item-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 8px; border-top: 1px solid var(--border);
  font-size: 10px;
}
.item-meta { display: flex; align-items: center; gap: 8px; color: var(--muted); font-weight: 600; }
.item-meta .by { color: var(--teal-deep); font-weight: 700; }
.item-reactions { display: flex; gap: 3px; }
.reaction-chip {
  background: transparent; border: 1px solid transparent; border-radius: 11px;
  padding: 2px 6px; font-size: 11px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 3px; line-height: 1;
}
.reaction-chip:hover { background: var(--navy-tint); }
.reaction-chip.active { background: var(--amber-tint); border-color: var(--amber); }
.reaction-chip .count { font-size: 9px; font-weight: 700; color: var(--amber); }

/* ── MODAL ── */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(25,33,102,.45); backdrop-filter: blur(6px);
  z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.hidden { display: none; }
.modal-box {
  background: #fff; border-radius: var(--r); padding: 0;
  width: 560px; max-width: 100%; max-height: 90vh; overflow: hidden;
  box-shadow: 0 24px 70px rgba(25,33,102,.20); border: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.modal-box.modal-wide { width: 720px; }
.modal-box.modal-narrow { width: 440px; }
.modal-head {
  padding: 22px 26px 14px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--muted); }
.modal-body { padding: 20px 26px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 14px 26px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end; background: var(--bg2);
}

.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 800; color: var(--muted);
  margin-bottom: 5px; letter-spacing: 0.06em; text-transform: uppercase;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border-m);
  font-size: 13px; outline: none; color: var(--navy); background: var(--bg2);
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--teal-deep); background: #fff; box-shadow: 0 0 0 3px rgba(0,196,208,0.12);
}
.field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.settings-section textarea {
  font-family: 'SFMono-Regular', 'Consolas', monospace; font-size: 12px;
}
.settings-section textarea:disabled {
  background: var(--bg2); color: var(--muted); cursor: not-allowed; opacity: 0.85;
}
.field-help { font-size: 11px; color: var(--muted); margin-top: 4px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn {
  padding: 9px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; border: 1.5px solid transparent;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary {
  background: var(--navy); color: #fff;
  box-shadow: none;
}
.btn-primary:hover { background: var(--teal-deep); box-shadow: none; transform: none; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-secondary {
  background: #fff; color: var(--navy); border-color: var(--border-m);
}
.btn-secondary:hover { background: var(--bg2); border-color: var(--teal-deep); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { background: var(--navy-tint); color: var(--navy); }
.btn-danger { background: #fff; color: var(--red); border-color: rgba(228,0,58,0.25); }
.btn-danger:hover { background: var(--red-tint); border-color: var(--red); }

/* Tab selector in add modal */
.tab-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-option {
  flex: 1; min-width: 80px; padding: 10px 8px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border-m); background: var(--bg2); cursor: pointer;
  text-align: center; font-size: 12px; font-weight: 600; color: var(--muted);
  transition: all .15s;
}
.tab-option:hover { border-color: var(--teal-deep); color: var(--navy); }
.tab-option.selected { border-color: var(--teal-deep); background: var(--teal-tint); color: var(--teal-deep); font-weight: 700; }

/* Tag input */
.tag-input-wrap {
  display: flex; flex-wrap: wrap; gap: 5px; padding: 7px;
  border: 1.5px solid var(--border-m); border-radius: var(--r-sm); background: var(--bg2);
  min-height: 38px; align-items: center;
}
.tag-input-wrap:focus-within { border-color: var(--teal-deep); background: #fff; box-shadow: 0 0 0 3px rgba(0,196,208,0.12); }
.tag-pill {
  background: var(--teal-tint); color: var(--teal-deep); border-radius: 5px;
  padding: 2px 6px 2px 8px; font-size: 11px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}
.tag-pill button {
  background: none; border: none; color: var(--teal-deep); cursor: pointer; font-size: 14px;
  line-height: 1; padding: 0; opacity: 0.6;
}
.tag-pill button:hover { opacity: 1; }
.tag-input {
  flex: 1; min-width: 80px; border: none; outline: none; background: transparent;
  font-size: 12px; padding: 2px 4px;
}
.tag-suggestions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag-suggestion {
  background: rgba(255,255,255,0.6); border: 1px dashed rgba(25,33,102,0.25);
  color: var(--muted); border-radius: 5px; padding: 1px 7px; font-size: 10px;
  cursor: pointer; transition: all .15s;
}
.tag-suggestion:hover { background: var(--teal-tint); color: var(--teal-deep); border-style: solid; border-color: var(--teal-deep); }

/* Detail modal */
.detail-image {
  width: 100%; aspect-ratio: 1.91 / 1; background: linear-gradient(135deg, #edf0f8, #dfe5f0);
  display: flex; align-items: center; justify-content: center; color: var(--muted2); font-size: 60px;
  overflow: hidden; border-radius: var(--r); margin-bottom: 14px;
}
.detail-image img { width: 100%; height: 100%; object-fit: cover; }
.detail-title { font-size: 18px; font-weight: 800; color: var(--navy); line-height: 1.3; margin-bottom: 6px; }
.detail-source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.detail-source-link {
  font-size: 12px; color: var(--teal-deep); text-decoration: none; font-weight: 700;
  display: inline-flex; align-items: center; gap: 4px;
}
.detail-source-link:hover { text-decoration: underline; }
.detail-desc { font-size: 13px; color: #4b5876; line-height: 1.65; margin-bottom: 16px; }
.detail-meta-row {
  display: flex; gap: 16px; padding: 10px 0; border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border); margin-bottom: 14px; font-size: 11px; color: var(--muted);
  flex-wrap: wrap;
}
.detail-meta-row strong { color: var(--navy); font-weight: 700; }
.detail-reactions {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.detail-reaction-btn {
  background: rgba(255,255,255,0.6); border: 1.5px solid var(--border-m);
  border-radius: 22px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  font-weight: 600; color: var(--muted);
}
.detail-reaction-btn:hover { border-color: var(--teal-deep); color: var(--navy); }
.detail-reaction-btn.active {
  background: var(--amber-tint); border-color: var(--amber); color: var(--amber);
}
.detail-reaction-count { font-size: 11px; font-weight: 700; }
.detail-reactors { font-size: 10px; color: var(--muted); opacity: 0.8; }

/* Settings */
.settings-section {
  margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border);
}
.settings-section:last-child { border-bottom: none; }
.settings-section-title { font-size: 12px; font-weight: 800; color: var(--navy); margin-bottom: 10px; }
.settings-section-sub { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.55; }
.settings-section-sub code { background: var(--navy-tint); padding: 1px 5px; border-radius: 4px; font-family: 'SFMono-Regular', monospace; font-size: 11px; color: var(--navy); }
.test-result {
  margin-top: 8px; padding: 8px 12px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600;
}
.test-result.success { background: var(--green-tint); color: var(--green); border: 1px solid rgba(61,158,74,0.25); }
.test-result.error   { background: var(--red-tint); color: var(--red); border: 1px solid rgba(228,0,58,0.25); }
.test-result.loading { background: var(--navy-tint); color: var(--muted); border: 1px solid var(--border); }

/* Loading spinner */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(0,196,208,0.20); border-top-color: var(--teal-deep);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  position: absolute; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center; z-index: 50;
  border-radius: inherit;
}

/* ── History ── */
.history-day-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  letter-spacing: 0.12em; padding: 14px 4px 6px;
  position: sticky; top: -20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(4px);
  z-index: 1; border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.history-day-label:first-child { padding-top: 4px; }
.history-entry {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 4px; border-bottom: 1px solid var(--border);
  font-size: 12px; line-height: 1.5;
}
.history-entry:last-child { border-bottom: none; }
.history-icon {
  flex-shrink: 0; width: 24px; text-align: center; margin-top: -1px;
  font-size: 13px; font-weight: 600; color: var(--muted);
}
.history-text {
  flex: 1; color: var(--navy);
}
.history-text strong { font-weight: 700; color: var(--teal-deep); }
.history-item-link {
  color: var(--navy); text-decoration: none; font-weight: 600;
  border-bottom: 1px dotted var(--border-m); transition: all .15s;
}
.history-item-link:hover { color: var(--teal-deep); border-bottom-color: var(--teal-deep); }
.history-item-deleted {
  color: var(--muted); text-decoration: line-through; font-weight: 500;
}
.history-time {
  font-size: 10px; color: var(--muted2); flex-shrink: 0;
  font-variant-numeric: tabular-nums; padding-top: 2px;
}

/* ── FAB (Floating Action Button) ── */
.fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 90;
  background: var(--navy);
  color: #fff; border: none; cursor: pointer;
  border-radius: 8px; padding: 11px 20px;
  font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
  box-shadow: 0 4px 16px rgba(25,33,102,0.25);
  display: flex; align-items: center; gap: 8px;
  transition: all .15s;
}
.fab:hover {
  background: var(--teal-deep);
  box-shadow: 0 6px 20px rgba(0,158,189,0.30);
  transform: translateY(-1px);
}
.fab:active { transform: translateY(0); }
.fab-label { line-height: 1; }

/* Responsive */
@media (max-width: 768px) {
  .topbar { padding: 0 14px; height: auto; flex-wrap: wrap; gap: 10px; padding: 10px 14px; }
  .tabs-wrap { width: 100%; order: 3; overflow-x: auto; }
  .filterbar { padding: 10px 14px; }
  .main-content { padding: 14px 14px 100px; grid-template-columns: 1fr; }
  .modal-box { width: 100% !important; }
  .topbar-sub { display: none; }
  .fab { bottom: 18px; right: 18px; padding: 14px; border-radius: 50%; }
  .fab-label { display: none; }
}
</style>

<script>
// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ai-radar-settings';
const FEED_PATH = 'feeds/team-ai.json';
const CORS_PROXY = 'https://corsproxy.io/?url=';

const REACTIONS = [
  { key: 'important', emoji: '⭐', label: 'важно' },
  { key: 'must_read', emoji: '🔥', label: 'must-read' },
  { key: 'watch_later', emoji: '👀', label: 'ще го гледам' },
  { key: 'tried', emoji: '✅', label: 'изпробвал' }
];

const TAB_LABELS = {
  feed: 'Feed', team: 'Team Feed', claude: 'Claude', gemini: 'Gemini', chatgpt: 'ChatGPT', other: 'Other'
};
const TAB_KEYS = ['feed', 'team', 'claude', 'gemini', 'chatgpt', 'other'];
const MODEL_CATEGORIES = ['claude', 'gemini', 'chatgpt', 'other'];

// Admin (filter rules editor). Match is case-insensitive on userName.
const ADMIN_NAMES = ['boris'];

// Default filter config — used if config doesn't yet exist in GitHub
const DEFAULT_FILTER_CONFIG = {
  // Negative keywords — items whose title or description match any of these are skipped by Worker
  blacklistKeywords: [
    'taylor swift', 'kardashian', 'celebrity', 'gossip',
    'crypto pump', 'meme coin', 'nft drop',
    'trump', 'politics', 'election',
  ],
  // Domains/patterns that should be auto-categorized into a model tab
  // Each rule: { pattern: 'string', category: 'claude'|'gemini'|'chatgpt' }
  categorizationWhitelist: [
    { pattern: 'anthropic.com',  category: 'claude' },
    { pattern: 'claude.ai',      category: 'claude' },
    { pattern: 'openai.com',     category: 'chatgpt' },
    { pattern: 'chatgpt.com',    category: 'chatgpt' },
    { pattern: 'deepmind.google', category: 'gemini' },
    { pattern: 'gemini.google',  category: 'gemini' },
  ],
  // Disabled sources — Worker skips these. Names must match those defined in worker.js exactly.
  disabledSources: [],
};

const COMMON_TAGS = ['release', 'coding', 'agents', 'research', 'tutorial', 'pricing', 'opinion', 'tool', 'benchmark', 'paper', 'discussion'];

const S = {
  settings: {
    userName: '',
    githubRepo: '',
    githubToken: '',
    viewMode: 'list',  // 'list' | 'grid'
  },
  feed: { version: 1, items: [], activity: [], filterConfig: null, _sha: null },
  ui: {
    activeTab: 'team',
    contentType: 'all',
    searchQuery: '',
    sharedByFilter: '',
    tagFilter: '',
    showOlder: false  // false = last 7 days, true = all
  },
  syncing: false,
  initialLoadDone: false
};

// ─────────────────────────────────────────────────────────────
// SETTINGS PERSISTENCE
// ─────────────────────────────────────────────────────────────
function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      Object.assign(S.settings, parsed);
    }
  } catch (e) { console.warn('Settings load failed', e); }
}
function saveSettings() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.settings)); }
  catch (e) { console.warn('Settings save failed', e); }
}
function settingsConfigured() {
  return !!(S.settings.githubRepo && S.settings.githubToken && S.settings.userName);
}

function isAdmin() {
  const me = (S.settings.userName || '').trim().toLowerCase();
  return ADMIN_NAMES.includes(me);
}

function getFilterConfig() {
  return S.feed.filterConfig || DEFAULT_FILTER_CONFIG;
}

function updateFabVisibility() {
  const fab = document.getElementById('fab-add');
  if (!fab) return;
  // Hide FAB on Feed tab — auto-only, manual additions not allowed there
  fab.style.display = S.ui.activeTab === 'feed' ? 'none' : '';
}

// ─────────────────────────────────────────────────────────────
// STATUS INDICATOR
// ─────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('save-dot');
  if (!dot) return;
  dot.className = 'save-dot ' + state;
  dot.title = text;
}

// ─────────────────────────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────────────────────────
async function ghHeaders() {
  return {
    'Authorization': `Bearer ${S.settings.githubToken}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json'
  };
}

async function ghLoadFeed() {
  if (!settingsConfigured()) return;
  setStatus('saving', 'Loading...');
  try {
    const url = `https://api.github.com/repos/${S.settings.githubRepo}/contents/${FEED_PATH}`;
    const res = await fetch(url, { headers: await ghHeaders() });
    if (res.status === 404) {
      // File doesn't exist yet — start with empty feed
      S.feed = { version: 1, items: [], activity: [], filterConfig: JSON.parse(JSON.stringify(DEFAULT_FILTER_CONFIG)), _sha: null };
      setStatus('saved', 'New feed');
      return;
    }
    if (!res.ok) throw new Error(`GitHub ${res.status}: ${await res.text()}`);
    const data = await res.json();
    const content = atob(data.content.replace(/\s/g, ''));
    // Properly decode UTF-8 (atob returns binary string)
    const decoded = decodeURIComponent(escape(content));
    const parsed = JSON.parse(decoded);
    S.feed = { ...parsed, _sha: data.sha };
    migrateItems();
    setStatus('saved', `Synced · ${S.feed.items.length} items`);
  } catch (err) {
    console.error('Load feed error', err);
    setStatus('error', 'Load failed');
    throw err;
  }
}

function migrateItems() {
  // Ensure activity log exists
  if (!Array.isArray(S.feed.activity)) S.feed.activity = [];
  // Ensure filterConfig exists
  if (!S.feed.filterConfig) {
    S.feed.filterConfig = JSON.parse(JSON.stringify(DEFAULT_FILTER_CONFIG));
  }
  // Migrate old schema (single `tab` field) to new (source + category)
  let migrated = 0;
  S.feed.items.forEach(it => {
    if (it.source !== undefined && it.category !== undefined) return;
    if (it.tab === 'feed') { it.source = 'feed'; it.category = null; }
    else if (it.tab === 'team') { it.source = 'team'; it.category = null; }
    else if (['claude', 'gemini', 'chatgpt', 'other'].includes(it.tab)) {
      it.source = 'team';
      it.category = it.tab;
    } else {
      it.source = 'team';
      it.category = null;
    }
    delete it.tab;
    migrated++;
  });
  if (migrated > 0) console.log(`Migrated ${migrated} items to new schema`);
}

async function ghSaveFeed(retry = 0) {
  if (!settingsConfigured()) {
    setStatus('error', 'Settings missing');
    return false;
  }
  if (S.syncing) {
    // Queue: wait briefly and try again
    await new Promise(r => setTimeout(r, 200));
    return ghSaveFeed(retry);
  }
  S.syncing = true;
  setStatus('saving', 'Saving...');
  try {
    const url = `https://api.github.com/repos/${S.settings.githubRepo}/contents/${FEED_PATH}`;
    const payload = {
      version: S.feed.version,
      items: S.feed.items,
      activity: S.feed.activity || [],
      filterConfig: S.feed.filterConfig || DEFAULT_FILTER_CONFIG,
    };
    const jsonStr = JSON.stringify(payload, null, 2);
    // Properly encode UTF-8 to base64
    const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));
    const body = {
      message: `Update feed (${S.settings.userName || 'unknown'})`,
      content: base64Content,
      ...(S.feed._sha ? { sha: S.feed._sha } : {})
    };
    const res = await fetch(url, {
      method: 'PUT',
      headers: await ghHeaders(),
      body: JSON.stringify(body)
    });
    if (res.status === 409 || res.status === 422) {
      // SHA conflict — someone else wrote in between
      if (retry < 2) {
        S.syncing = false;
        await mergeRemoteAndRetry();
        return ghSaveFeed(retry + 1);
      } else {
        throw new Error('Conflict resolution failed after retries');
      }
    }
    if (!res.ok) throw new Error(`GitHub ${res.status}: ${await res.text()}`);
    const data = await res.json();
    S.feed._sha = data.content.sha;
    setStatus('saved', `Synced · ${S.feed.items.length} items`);
    S.syncing = false;
    return true;
  } catch (err) {
    console.error('Save feed error', err);
    setStatus('error', 'Save failed');
    S.syncing = false;
    return false;
  }
}

async function mergeRemoteAndRetry() {
  // Fetch latest from server, merge our local changes, then retry save
  const localItems = S.feed.items.slice();
  const localActivity = (S.feed.activity || []).slice();
  await ghLoadFeed();
  // Merge items: keep all remote items, overlay our local items (by id)
  const remoteById = new Map(S.feed.items.map(it => [it.id, it]));
  for (const localItem of localItems) {
    const remote = remoteById.get(localItem.id);
    if (!remote) {
      remoteById.set(localItem.id, localItem);
    } else {
      const localTs = new Date(localItem._updatedAt || localItem.addedAt).getTime();
      const remoteTs = new Date(remote._updatedAt || remote.addedAt).getTime();
      if (localTs >= remoteTs) {
        remoteById.set(localItem.id, localItem);
      }
    }
  }
  S.feed.items = Array.from(remoteById.values());
  // Merge activity by id, keep newest first
  const actById = new Map((S.feed.activity || []).map(a => [a.id, a]));
  for (const localAct of localActivity) {
    if (!actById.has(localAct.id)) actById.set(localAct.id, localAct);
  }
  S.feed.activity = Array.from(actById.values())
    .sort((a, b) => new Date(b.at) - new Date(a.at))
    .slice(0, ACTIVITY_CAP);
}

async function ghTestConnection() {
  if (!S.settings.githubRepo || !S.settings.githubToken) {
    return { ok: false, error: 'Repo and token required' };
  }
  try {
    const url = `https://api.github.com/repos/${S.settings.githubRepo}`;
    const res = await fetch(url, { headers: await ghHeaders() });
    if (res.status === 404) return { ok: false, error: 'Repo not found or no access' };
    if (res.status === 401) return { ok: false, error: 'Invalid token' };
    if (!res.ok) return { ok: false, error: `GitHub ${res.status}` };
    const data = await res.json();
    return { ok: true, repoName: data.full_name, private: data.private };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ─────────────────────────────────────────────────────────────
// METADATA FETCHING (Open Graph)
// ─────────────────────────────────────────────────────────────
async function fetchMetadata(url) {
  // Detect content type from URL
  const contentType = detectContentType(url);

  // Try platform-specific oEmbed APIs first (no CORS issues)
  const oembed = await tryOembed(url);
  if (oembed) {
    return { ...oembed, contentType, domain: getDomain(url) };
  }

  // Fall back to generic CORS proxy + Open Graph
  try {
    const proxyUrl = CORS_PROXY + encodeURIComponent(url);
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error(`Proxy returned ${res.status}`);
    const html = await res.text();
    const meta = parseMetadata(html, url);
    meta.contentType = contentType;
    return meta;
  } catch (err) {
    console.warn('Metadata fetch failed:', err);
    return {
      title: '',
      description: '',
      image: '',
      domain: getDomain(url),
      contentType,
      _fetchFailed: true
    };
  }
}

async function tryOembed(url) {
  let oembedUrl = null;

  // YouTube
  const ytId = extractYoutubeId(url);
  if (ytId) {
    oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
  }
  // Vimeo
  else if (/vimeo\.com\/\d+/.test(url)) {
    oembedUrl = `https://vimeo.com/api/oembed.json?url=${encodeURIComponent(url)}`;
  }

  if (!oembedUrl) return null;

  try {
    const res = await fetch(oembedUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return null;
    const data = await res.json();
    // For YouTube, prefer high-res thumbnail constructed from ID
    let image = data.thumbnail_url || '';
    if (ytId) image = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
    return {
      title: data.title || '',
      description: data.author_name ? `By ${data.author_name}` : '',
      image
    };
  } catch (e) {
    console.warn('oEmbed fetch failed:', e);
    return null;
  }
}

function extractYoutubeId(url) {
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function parseMetadata(html, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const get = (sel) => {
    const el = doc.querySelector(sel);
    return el ? (el.getAttribute('content') || el.textContent || '').trim() : '';
  };
  const title = get('meta[property="og:title"]') || get('meta[name="twitter:title"]') || get('title');
  const description = get('meta[property="og:description"]') || get('meta[name="twitter:description"]') || get('meta[name="description"]');
  let image = get('meta[property="og:image"]') || get('meta[name="twitter:image"]');
  // Handle relative image URLs
  if (image && !image.startsWith('http')) {
    try { image = new URL(image, url).href; } catch (e) { image = ''; }
  }
  return {
    title: title.slice(0, 300),
    description: description.slice(0, 500),
    image,
    domain: getDomain(url)
  };
}

function detectContentType(url) {
  if (/youtube\.com|youtu\.be|vimeo\.com|twitch\.tv|tiktok\.com/.test(url)) return 'video';
  if (/spotify\.com\/episode|spotify\.com\/show|podcasts\.apple\.com|podcasts\.google\.com|overcast\.fm|pca\.st|castbox\.fm|podbean\.com|anchor\.fm|soundcloud\.com|player\.fm|stitcher\.com|simplecast\.com|buzzsprout\.com|libsyn\.com|transistor\.fm|fireside\.fm|podtail\.com/.test(url)) return 'podcast';
  return 'article';
}

function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); }
  catch (e) { return ''; }
}

// ─────────────────────────────────────────────────────────────
// ACTIVITY LOG
// ─────────────────────────────────────────────────────────────
const ACTIVITY_CAP = 500;

function logActivity(type, item, extras = {}) {
  if (!S.feed.activity) S.feed.activity = [];
  S.feed.activity.unshift({
    id: 'a_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
    type,                                  // 'add' | 'delete' | 'categorize'
    itemId: item.id,
    itemTitle: item.title || item.url,
    itemUrl: item.url,
    itemSource: item.source,
    by: S.settings.userName || 'unknown',
    at: new Date().toISOString(),
    ...extras
  });
  // Cap to avoid runaway file size
  if (S.feed.activity.length > ACTIVITY_CAP) {
    S.feed.activity = S.feed.activity.slice(0, ACTIVITY_CAP);
  }
}

// ─────────────────────────────────────────────────────────────
// URL NORMALIZATION & DUPLICATE DETECTION
// ─────────────────────────────────────────────────────────────
const TRACKING_PARAMS = new Set([
  'utm_source','utm_medium','utm_campaign','utm_term','utm_content',
  'fbclid','gclid','dclid','msclkid','yclid',
  'ref','ref_src','source','referrer','origin',
  'mc_cid','mc_eid','_ga','_gl','igshid','si','feature','spm'
]);

function normalizeUrl(rawUrl) {
  if (!rawUrl) return '';
  try {
    const u = new URL(rawUrl.trim());
    // YouTube: canonicalize to youtube.com/watch?v=ID (strips youtu.be, m.youtube, embed/, shorts/)
    const ytId = extractYoutubeId(rawUrl);
    if (ytId) return `youtube.com/watch?v=${ytId}`;
    // Lowercase host, strip www
    let host = u.hostname.toLowerCase().replace(/^www\./, '');
    // Strip tracking params
    const params = new URLSearchParams(u.search);
    const cleanParams = new URLSearchParams();
    Array.from(params.keys()).sort().forEach(k => {
      if (!TRACKING_PARAMS.has(k.toLowerCase())) cleanParams.append(k, params.get(k));
    });
    const qs = cleanParams.toString();
    // Strip trailing slash from path
    let path = u.pathname.replace(/\/+$/, '') || '/';
    return host + path + (qs ? '?' + qs : '');
  } catch (e) {
    return rawUrl.trim().toLowerCase();
  }
}

function findDuplicate(url) {
  const norm = normalizeUrl(url);
  if (!norm) return null;
  return S.feed.items.find(it => normalizeUrl(it.url) === norm) || null;
}
function genId() {
  return 'i_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function newItem({ url, title, description, image, domain, contentType, source, category, tags }) {
  return {
    id: genId(),
    url,
    title: title || url,
    description: description || '',
    image: image || '',
    domain: domain || getDomain(url),
    contentType: contentType || 'article',
    source: source || 'team',         // 'feed' (auto-fetched) | 'team' (manual)
    category: category || null,       // null | 'claude' | 'gemini' | 'chatgpt' | 'other'
    tags: tags || [],
    addedAt: new Date().toISOString(),
    addedBy: S.settings.userName || 'unknown',
    readBy: [S.settings.userName || 'unknown'],
    reactions: REACTIONS.reduce((a, r) => (a[r.key] = [], a), {}),
    _updatedAt: new Date().toISOString()
  };
}

function findItem(id) { return S.feed.items.find(it => it.id === id); }

function toggleReaction(itemId, key) {
  const it = findItem(itemId);
  if (!it) return;
  const me = S.settings.userName || 'unknown';
  if (!it.reactions[key]) it.reactions[key] = [];
  const idx = it.reactions[key].indexOf(me);
  if (idx >= 0) it.reactions[key].splice(idx, 1);
  else it.reactions[key].push(me);
  it._updatedAt = new Date().toISOString();
  ghSaveFeed();
  render();
}

function markAsRead(itemId) {
  const it = findItem(itemId);
  if (!it) return;
  if (!it.readBy) it.readBy = [];
  const me = S.settings.userName || 'unknown';
  if (!it.readBy.includes(me)) {
    it.readBy.push(me);
    it._updatedAt = new Date().toISOString();
    ghSaveFeed();
  }
}

function setItemCategory(itemId, category) {
  const it = findItem(itemId);
  if (!it) return;
  if (it.category === category) return;  // no change
  const oldCategory = it.category;
  it.category = category;
  it._updatedAt = new Date().toISOString();
  logActivity('categorize', it, { oldCategory, newCategory: category });
  ghSaveFeed();
  render();
}

function deleteItem(itemId) {
  const idx = S.feed.items.findIndex(it => it.id === itemId);
  if (idx >= 0) {
    const it = S.feed.items[idx];
    logActivity('delete', it);
    S.feed.items.splice(idx, 1);
    ghSaveFeed();
    render();
    closeModal();
  }
}

// ─────────────────────────────────────────────────────────────
// FILTERING & RENDERING
// ─────────────────────────────────────────────────────────────
function matchesActiveTab(it, tab) {
  if (tab === 'feed') return it.source === 'feed';
  if (tab === 'team') return it.source === 'team';
  // model tabs filter by category — items can be in source tab AND in their category tab
  return it.category === tab;
}

function getFilteredItems() {
  const me = S.settings.userName || 'unknown';
  const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  let items = S.feed.items.slice();

  // Tab filter
  items = items.filter(it => matchesActiveTab(it, S.ui.activeTab));

  // Content type filter
  if (S.ui.contentType !== 'all') {
    items = items.filter(it => it.contentType === S.ui.contentType);
  }

  // Search filter
  if (S.ui.searchQuery) {
    const q = S.ui.searchQuery.toLowerCase();
    items = items.filter(it => {
      const haystack = [it.title, it.description, ...(it.tags || []), it.domain, it.addedBy].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }

  // Shared by filter
  if (S.ui.sharedByFilter) {
    items = items.filter(it => it.addedBy === S.ui.sharedByFilter);
  }

  // Tag filter
  if (S.ui.tagFilter) {
    items = items.filter(it => (it.tags || []).includes(S.ui.tagFilter));
  }

  // Recency filter (default: last 7 days)
  if (!S.ui.showOlder) {
    items = items.filter(it => new Date(it.addedAt).getTime() >= sevenDaysAgo);
  }

  // Sort: unread first (per current user), then by date desc
  items.sort((a, b) => {
    const aRead = (a.readBy || []).includes(me);
    const bRead = (b.readBy || []).includes(me);
    if (aRead !== bRead) return aRead ? 1 : -1;
    return new Date(b.addedAt) - new Date(a.addedAt);
  });

  return items;
}

function countWithFilters(overrides = {}) {
  const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const f = { ...S.ui, ...overrides };
  let items = S.feed.items.slice();
  if (f.activeTab) items = items.filter(it => matchesActiveTab(it, f.activeTab));
  if (f.contentType && f.contentType !== 'all') items = items.filter(it => it.contentType === f.contentType);
  if (f.searchQuery) {
    const q = f.searchQuery.toLowerCase();
    items = items.filter(it => {
      const haystack = [it.title, it.description, ...(it.tags || []), it.domain, it.addedBy].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }
  if (f.sharedByFilter) items = items.filter(it => it.addedBy === f.sharedByFilter);
  if (f.tagFilter) items = items.filter(it => (it.tags || []).includes(f.tagFilter));
  if (!f.showOlder) items = items.filter(it => new Date(it.addedAt).getTime() >= sevenDaysAgo);
  return items.length;
}

function updateTabCounts() {
  TAB_KEYS.forEach(tab => {
    const el = document.querySelector(`[data-count="${tab}"]`);
    if (el) el.textContent = countWithFilters({ activeTab: tab });
  });
  ['all', 'article', 'video', 'podcast', 'other'].forEach(type => {
    const el = document.querySelector(`[data-type-count="${type}"]`);
    if (el) el.textContent = countWithFilters({ contentType: type });
  });
}

function updateFilterDropdowns() {
  // Shared by — count items from each member with all OTHER filters applied
  const sharedBySet = new Set();
  S.feed.items.forEach(it => sharedBySet.add(it.addedBy || 'unknown'));
  const sharedSelect = document.getElementById('sharedby-filter');
  const currentShared = sharedSelect.value;
  const sharedAllCount = countWithFilters({ sharedByFilter: '' });
  sharedSelect.innerHTML = `<option value="">All members (${sharedAllCount})</option>` +
    Array.from(sharedBySet).sort().map(n => {
      const c = countWithFilters({ sharedByFilter: n });
      return `<option value="${escapeAttr(n)}">${escapeHtml(n)} (${c})</option>`;
    }).join('');
  sharedSelect.value = currentShared;

  // Tags — count with all OTHER filters
  const tagSet = new Set();
  S.feed.items.forEach(it => (it.tags || []).forEach(t => tagSet.add(t)));
  const tagSelect = document.getElementById('tag-filter');
  const currentTag = tagSelect.value;
  const tagAllCount = countWithFilters({ tagFilter: '' });
  tagSelect.innerHTML = `<option value="">All tags (${tagAllCount})</option>` +
    Array.from(tagSet).sort().map(t => {
      const c = countWithFilters({ tagFilter: t });
      return `<option value="${escapeAttr(t)}">#${escapeHtml(t)} (${c})</option>`;
    }).join('');
  tagSelect.value = currentTag;
}

}

function renderCard(it) {
  const me = S.settings.userName || 'unknown';
  const isUnread = !(it.readBy || []).includes(me);
  const showCatBadge = ['claude', 'gemini', 'chatgpt', 'other'].includes(it.category);
  const tabBadge = showCatBadge ? `<span class="item-tab-badge tab-${it.category}">${TAB_LABELS[it.category]}</span>` : '';
  const sourceBadge = it.domain ? `<span class="item-source-badge">${faviconImg(it.domain)} ${escapeHtml(it.domain)}</span>` : '';
  const typeEmoji = it.contentType === 'video' ? '▶' : (it.contentType === 'podcast' ? '🎙' : '📄');
  const typeIcon = (it.contentType === 'video' || it.contentType === 'podcast') ? `<div class="type-icon">${typeEmoji}</div>` : '';
  const tags = (it.tags || []).slice(0, 3).map(t => `<span class="tag-chip">#${escapeHtml(t)}</span>`).join('');
  const reactionChips = REACTIONS.map(r => {
    const list = it.reactions?.[r.key] || [];
    if (list.length === 0) return '';
    return `<span class="reaction-chip"><span>${r.emoji}</span><span class="count">${list.length}</span></span>`;
  }).filter(Boolean).join('');
  const ago = timeAgo(it.addedAt);

  return `
    <div class="item-card ${isUnread ? 'unread' : ''}" onclick="openItemDetail('${it.id}')">
      <div class="item-image">
        ${it.image
          ? `<img src="${escapeAttr(it.image)}" onerror="this.outerHTML='<div class=\\'item-image-fallback\\'>${typeEmoji}</div>'" alt="">`
          : `<div class="item-image-fallback">${typeEmoji}</div>`}
        ${sourceBadge}
        ${tabBadge}
        ${typeIcon}
      </div>
      <div class="item-body">
        <div class="item-title">${escapeHtml(it.title)}</div>
        ${it.description ? `<div class="item-desc">${escapeHtml(it.description)}</div>` : ''}
        ${tags ? `<div class="item-tags">${tags}</div>` : ''}
        <div class="item-foot">
          <div class="item-meta">
            <span class="by">${escapeHtml(it.addedBy || 'unknown')}</span>
            <span>·</span>
            <span>${ago}</span>
          </div>
          <div class="item-reactions">${reactionChips}</div>
        </div>
      </div>
    </div>`;
}

function faviconImg(domain) {
  return `<img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32" style="width:12px;height:12px;border-radius:2px;" onerror="this.style.display='none'">`;

async function saveSettingsFromModal() {
  const name = document.getElementById('set-name').value.trim();
  const repo = document.getElementById('set-repo').value.trim();
  const token = document.getElementById('set-token').value.trim();
  if (!name || !repo || !token) {
    alert('Name, repo, and token are required.');
    return;
  }
  S.settings.userName = name;
  S.settings.githubRepo = repo;
  S.settings.githubToken = token;
  saveSettings();

  // If admin, parse and save filter config too
  let configChanged = false;
  if (isAdmin()) {
    const blacklistEl = document.getElementById('cfg-blacklist');
    const whitelistEl = document.getElementById('cfg-whitelist');
    const disabledEl = document.getElementById('cfg-disabled');
    if (blacklistEl && whitelistEl && disabledEl) {
      const newConfig = {
        blacklistKeywords: parseLines(blacklistEl.value).map(s => s.toLowerCase()),
        categorizationWhitelist: parseWhitelist(whitelistEl.value),
        disabledSources: parseLines(disabledEl.value),
      };
      if (JSON.stringify(newConfig) !== JSON.stringify(S.feed.filterConfig)) {
        S.feed.filterConfig = newConfig;
        configChanged = true;
      }
    }
  }

  closeModal();
  try {
    if (configChanged) {
      // Save current state with new config
      await ghSaveFeed();
    } else {
      // Just reload feed with new credentials
      await ghLoadFeed();
    }
    render();
  } catch (e) {
    alert('Saved settings, but feed sync failed: ' + e.message);
  }
}

function parseLines(text) {
  return (text || '').split('\n')
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

function parseWhitelist(text) {
  const validCategories = new Set(MODEL_CATEGORIES);
  const rules = [];
  for (const line of parseLines(text)) {
    const m = line.match(/^(.+?)\s*(?:→|->|=>|\|)\s*(\w+)$/);
    if (!m) continue;
    const pattern = m[1].trim();
    const category = m[2].trim().toLowerCase();
    if (validCategories.has(category) && pattern) {
      rules.push({ pattern, category });
    }
  }
  return rules;
}

// ─── History modal ───
function openHistory() {
  const acts = (S.feed.activity || []).slice();
  let bodyHtml;
  if (acts.length === 0) {
    bodyHtml = `
      <div style="text-align:center; padding:40px 20px; color: var(--muted);">
        <div style="font-size:42px; opacity:0.5; margin-bottom:12px;">📭</div>
        <div style="font-size:13px;">No activity yet. Add or move some items to populate the log.</div>
      </div>`;
  } else {
    // Group by day
    const groups = new Map();
    for (const a of acts) {
      const key = formatDayKey(a.at);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(a);
    }
    bodyHtml = '';
    for (const [day, entries] of groups) {
      bodyHtml += `<div class="history-day-label">${day}</div>`;
      bodyHtml += entries.map(renderActivityEntry).join('');
    }
  }
  const html = `
    <div class="modal-box modal-wide">
      <div class="modal-head">
        <div class="modal-title">Activity</div>
        <div class="modal-sub">Latest changes from the team. Last ${ACTIVITY_CAP} actions are kept.</div>
      </div>
      <div class="modal-body" style="padding-top: 12px;">
        ${bodyHtml}
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  showModal(html);
}

function renderActivityEntry(a) {
  let icon = '•', verb = '', extra = '';
  if (a.type === 'add') {
    icon = '+'; verb = 'added';
    if (a.category) extra = `<span class="item-tab-badge tab-${a.category}" style="position:static;box-shadow:none;font-size:9px;padding:2px 6px;margin-left:6px;">${TAB_LABELS[a.category]}</span>`;
  } else if (a.type === 'delete') {
    icon = '−'; verb = 'deleted';
  } else if (a.type === 'categorize') {
    icon = '↷'; 
    if (a.newCategory && a.oldCategory) {
      verb = `re-categorized as`;
      extra = `<span class="item-tab-badge tab-${a.newCategory}" style="position:static;box-shadow:none;font-size:9px;padding:2px 6px;margin-left:6px;">${TAB_LABELS[a.newCategory]}</span> <span style="color:var(--muted);font-size:10px;">(was ${TAB_LABELS[a.oldCategory]})</span>`;
    } else if (a.newCategory) {
      verb = 'categorized as';
      extra = `<span class="item-tab-badge tab-${a.newCategory}" style="position:static;box-shadow:none;font-size:9px;padding:2px 6px;margin-left:6px;">${TAB_LABELS[a.newCategory]}</span>`;
    } else {
      verb = `removed category`;
      extra = a.oldCategory ? `<span style="color:var(--muted);font-size:10px;margin-left:6px;">(was ${TAB_LABELS[a.oldCategory]})</span>` : '';
    }
  }
  const itemStillExists = !!findItem(a.itemId);
  const titleHtml = itemStillExists
    ? `<a href="#" onclick="event.preventDefault(); closeModal(); openItemDetail('${a.itemId}');" class="history-item-link">${escapeHtml(a.itemTitle)}</a>`
    : `<span class="history-item-deleted">${escapeHtml(a.itemTitle)}</span>`;
  return `
    <div class="history-entry">
      <div class="history-icon">${icon}</div>
      <div class="history-text">
        <strong>${escapeHtml(a.by)}</strong> <span style="color:var(--muted)">${verb}</span> ${titleHtml}${extra}
      </div>
      <div class="history-time">${formatTime(a.at)}</div>
    </div>`;
}

function formatDayKey(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1);
  const dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const tDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  if (dDay.getTime() === tDay.getTime()) return 'TODAY';
  if (dDay.getTime() === yesterday.getTime()) return 'YESTERDAY';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

async function fetchAndFillMetadata() {
  const url = document.getElementById('add-url').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) {
    document.getElementById('fetch-status').innerHTML = '<div class="test-result error">URL must start with http:// or https://</div>';
    return;
  }

  // Duplicate check first — cheap, runs locally
  const dup = findDuplicate(url);
  if (dup) {
    const dupCategory = dup.category ? ` · in <strong>${TAB_LABELS[dup.category]}</strong>` : '';
    const sourceLabel = dup.source === 'feed' ? 'Auto-fetched' : 'Shared by ' + escapeHtml(dup.addedBy || 'someone');
    document.getElementById('fetch-status').innerHTML = `
      <div class="test-result error" style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
        <div><strong>⚠ Already in your feed</strong></div>
        <div style="font-weight:500;font-size:11px;line-height:1.5;">
          "${escapeHtml(dup.title)}"<br>
          ${sourceLabel} · ${timeAgo(dup.addedAt)}${dupCategory}
        </div>
        <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px;margin-top:4px;" onclick="closeModal(); openItemDetail('${dup.id}');">Open existing</button>
      </div>`;
    document.getElementById('add-form').style.display = 'none';
    document.getElementById('save-link-btn').disabled = true;
    return;
  }

  document.getElementById('fetch-status').innerHTML = '<div class="test-result loading"><span class="spinner"></span> Fetching metadata...</div>';
  document.getElementById('fetch-btn').disabled = true;

  const meta = await fetchMetadata(url);

  document.getElementById('fetch-btn').disabled = false;
  document.getElementById('fetch-status').innerHTML = meta._fetchFailed
    ? '<div class="test-result error">Couldn\'t fetch — fill in manually below.</div>'
    : '<div class="test-result success">✓ Metadata fetched</div>';

  document.getElementById('add-form').style.display = 'block';
  document.getElementById('add-title').value = meta.title || '';
  document.getElementById('add-desc').value = meta.description || '';
  document.getElementById('add-type').value = meta.contentType || 'article';
  document.getElementById('add-domain').value = meta.domain || '';
  // Pre-suggest category based on URL/domain/title (may be empty = None)
  const suggestedCat = suggestCategory(url, meta.title);
  selectCategory(suggestedCat);
  document.getElementById('save-link-btn').disabled = false;

  // Cache image for later
  window.__addImage = meta.image || '';
}

function suggestCategory(url, title) {
  const hay = (url + ' ' + (title || '')).toLowerCase();
  if (/anthropic\.com|claude\.ai|claude\b/.test(hay)) return 'claude';
  if (/gemini|deepmind|bard\b|google.*ai/.test(hay)) return 'gemini';
  if (/openai|chatgpt|gpt-?\d/.test(hay)) return 'chatgpt';
  return '';
}

function selectCategory(category) {
  document.querySelectorAll('.tab-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.tabValue === category);
  });
  window.__selectedCategory = category || null;
}

function handleTagKey(e) {
  const input = e.target;
  if (e.key === 'Enter' || e.key === ',' || e.key === ' ') {
    e.preventDefault();
    const v = input.value.trim().replace(/[,\s]+$/, '');
    if (v) addTag(v);
    input.value = '';
  } else if (e.key === 'Backspace' && !input.value && window.__addTags.length) {
    window.__addTags.pop();
    renderTags();
  }
}

function addTag(tag) {
  const t = tag.trim().toLowerCase().replace(/^#/, '');
  if (!t || window.__addTags.includes(t)) return;
  window.__addTags.push(t);
  renderTags();
}

function removeTag(tag) {
  window.__addTags = window.__addTags.filter(t => t !== tag);
  renderTags();
}

function renderTags() {
  const wrap = document.getElementById('tag-wrap');
  if (!wrap) return;
  const input = wrap.querySelector('input');
  // Remove existing pills
  wrap.querySelectorAll('.tag-pill').forEach(p => p.remove());
  // Add pills
  window.__addTags.forEach(t => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `#${escapeHtml(t)} <button onclick="removeTag('${escapeAttr(t)}')">×</button>`;
    wrap.insertBefore(pill, input);
  });
  input.focus();
}

// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d ago`;
  const w = Math.floor(d / 7);
  if (w < 4) return `${w}w ago`;
  return new Date(iso).toLocaleDateString();
}

// ─────────────────────────────────────────────────────────────
// EVENT WIRING
// ─────────────────────────────────────────────────────────────
function wireEvents() {
  // Tabs
  document.getElementById('tabs-wrap').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.ui.activeTab = btn.dataset.tab;
    render();
  });

  // Type chips
  document.getElementById('type-chips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    S.ui.contentType = chip.dataset.type;
    render();
  });

  // Search
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      S.ui.searchQuery = e.target.value.trim();
      render();
    }, 200);
  });

  // Shared by
  document.getElementById('sharedby-filter').addEventListener('change', e => {
    S.ui.sharedByFilter = e.target.value;
    render();
  });

  // Tag filter
  document.getElementById('tag-filter').addEventListener('change', e => {
    S.ui.tagFilter = e.target.value;
    render();
  });

  // Show older toggle
  document.getElementById('show-older').addEventListener('click', e => {
    S.ui.showOlder = !S.ui.showOlder;
    e.target.textContent = S.ui.showOlder ? 'Showing all' : 'Last 7 days';
    e.target.classList.toggle('active', !S.ui.showOlder);
    render();
  });

  // View toggle
  document.getElementById('view-toggle').addEventListener('click', () => {
    S.settings.viewMode = S.settings.viewMode === 'list' ? 'grid' : 'list';
    saveSettings();
    render();
  });

  // Buttons
  document.getElementById('fab-add').addEventListener('click', openAddLink);
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('history-btn').addEventListener('click', openHistory);
  document.getElementById('sync-btn').addEventListener('click', async () => {
    const btn = document.getElementById('sync-btn');
    btn.disabled = true;
    btn.style.opacity = 0.5;
    try { await ghLoadFeed(); render(); }
    catch (e) { /* setStatus already set */ }
    btn.disabled = false;
    btn.style.opacity = 1;
  });

  // ESC closes modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
async function init() {
  loadSettings();
  wireEvents();
  if (settingsConfigured()) {
    try {
      await ghLoadFeed();
    } catch (e) {
      console.error('Initial load failed', e);
    }
  } else {
    setStatus('error', 'Setup needed');
  }
  render();
  S.initialLoadDone = true;

  // Auto-sync every 60 seconds (light refresh, no overwrite)
  setInterval(async () => {
    if (!settingsConfigured() || S.syncing || document.getElementById('modal-overlay').children.length > 0) return;
    try {
      await ghLoadFeed();
      render();
    } catch (e) { /* silent */ }
  }, 60000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
